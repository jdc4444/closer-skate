<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>CLOSER — an infinite disco, on rollerskates</title>
<style>
  :root {
    --ink: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  body {
    font-family: "Courier New", Courier, monospace;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  #app { position: fixed; inset: 0; }
  #app canvas {
    display: block;
    filter: saturate(1.18) contrast(1.05);
  }

  /* ---------- film overlays ---------- */
  #grain {
    position: fixed; inset: -100px;
    pointer-events: none;
    opacity: 0.13;
    mix-blend-mode: overlay;
    animation: grainShift 0.6s steps(4) infinite;
    z-index: 20;
  }
  @keyframes grainShift {
    0%   { transform: translate(0, 0); }
    25%  { transform: translate(-34px, 22px); }
    50%  { transform: translate(18px, -40px); }
    75%  { transform: translate(-26px, -14px); }
    100% { transform: translate(30px, 28px); }
  }
  #vignette {
    position: fixed; inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at 50% 48%, transparent 52%, rgba(8, 0, 18, 0.42) 100%);
    z-index: 21;
  }

  /* ---------- HUD ---------- */
  #hud {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 30;
    opacity: 0;
    transition: opacity 1.2s ease;
    text-transform: uppercase;
    text-shadow: 0 0 14px rgba(255, 160, 220, 0.35), 0 1px 2px rgba(0,0,0,0.5);
  }
  #hud.on { opacity: 1; }
  .corner { position: absolute; letter-spacing: 0.22em; font-size: 13px; }
  #era    { top: 22px; left: 26px; }
  #flow   { top: 22px; right: 26px; text-align: right; line-height: 1.7; }
  #pack   { font-size: 11px; opacity: 0.8; }
  #speed  { bottom: 22px; right: 26px; text-align: right; font-size: 12px; opacity: 0.85; }
  #help   { bottom: 22px; left: 26px; font-size: 11px; opacity: 0.7; letter-spacing: 0.18em; transition: opacity 2s ease; }

  #meterWrap {
    position: absolute; bottom: 30px; left: 50%;
    transform: translateX(-50%);
    width: 240px; text-align: center;
  }
  #meterLabel { font-size: 11px; letter-spacing: 0.34em; margin-bottom: 7px; opacity: 0.95; }
  #meterBar {
    height: 3px; width: 100%;
    background: rgba(255,255,255,0.18);
    border-radius: 2px; overflow: hidden;
  }
  #meterFill {
    height: 100%; width: 0%;
    background: #fff;
    border-radius: 2px;
    box-shadow: 0 0 10px rgba(255,255,255,0.9);
    transition: width 0.15s linear, background 0.4s ease;
  }
  #toast {
    position: absolute; top: 34%; left: 50%;
    transform: translateX(-50%);
    font-size: 17px; letter-spacing: 0.42em;
    text-align: center; white-space: nowrap;
    opacity: 0; transition: opacity 0.6s ease;
    text-shadow: 0 0 22px rgba(255,180,230,0.8);
  }
  #toast.show { opacity: 1; }

  /* ---------- title screen (treatment cover homage) ---------- */
  #title {
    position: fixed; inset: 0;
    background: #fdfdfd;
    color: #1a1a1a;
    z-index: 40;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 1.6s ease;
    text-transform: none;
  }
  #title.gone { opacity: 0; pointer-events: none; }
  #sun {
    width: min(42vmin, 380px); height: min(42vmin, 380px);
    border-radius: 50%;
    background: #fff;
    box-shadow:
      0 0 60px 30px rgba(255, 158, 64, 0.55),
      0 0 140px 80px rgba(255, 158, 64, 0.28),
      0 0 260px 150px rgba(255, 158, 64, 0.12);
    animation: sunPulse 5s ease-in-out infinite;
  }
  @keyframes sunPulse {
    0%, 100% { box-shadow: 0 0 60px 30px rgba(255,158,64,0.55), 0 0 140px 80px rgba(255,158,64,0.28), 0 0 260px 150px rgba(255,158,64,0.12); }
    50%      { box-shadow: 0 0 70px 36px rgba(255,158,64,0.62), 0 0 160px 95px rgba(255,158,64,0.32), 0 0 300px 170px rgba(255,158,64,0.15); }
  }
  .tcorner { position: absolute; font-size: 13px; letter-spacing: 0.28em; }
  #tname  { top: 26px; left: 30px; font-weight: bold; }
  #tright { top: 26px; right: 30px; opacity: 0.6; }
  #tsub   { bottom: 26px; left: 30px; opacity: 0.85; }
  #tcred  { bottom: 26px; right: 30px; opacity: 0.5; font-size: 11px; }
  #tstart {
    position: absolute; bottom: 16%; left: 50%;
    transform: translateX(-50%);
    font-size: 13px; letter-spacing: 0.5em;
    animation: blink 1.8s ease-in-out infinite;
  }
  @keyframes blink { 0%,100% { opacity: 0.25; } 50% { opacity: 1; } }
</style>
</head>
<body>
  <div id="app"></div>

  <div id="grain"></div>
  <div id="vignette"></div>

  <div id="hud">
    <div id="era"   class="corner">NIGHT 1 &middot; THE BOARDWALK &middot; 1972</div>
    <div id="flow"  class="corner">FLOW 000000<br /><span id="pack">SKATING SOLO</span></div>
    <div id="speed" class="corner">0 KM/H</div>
    <div id="help"  class="corner">&larr;&rarr; turn &middot; &uarr; push &middot; &darr; brake &middot; space jump (hold: glide) &middot; in air &uarr;&darr;: tilt gravity &middot; shift low/dive &middot; m sound</div>
    <div id="meterWrap">
      <div id="meterLabel">FOLLOW THE LIGHT</div>
      <div id="meterBar"><div id="meterFill"></div></div>
    </div>
    <div id="toast"></div>
  </div>

  <div id="title">
    <div id="tname"  class="tcorner">C L O S E R</div>
    <div id="tright" class="tcorner">skate</div>
    <div id="sun"></div>
    <div id="tstart" class="tcorner">PRESS SPACE</div>
    <div id="tsub"   class="tcorner">an infinite disco, on rollerskates</div>
    <div id="tcred"  class="tcorner">after Art Camp&rsquo;s &ldquo;Hold Me Closer&rdquo;</div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
